<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>EmirAI v18.7 - Random Explorer</title>
    <style>
        :root {
            --accent: #00d2ff;
            --bg-grad: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
        }
        body { background: var(--bg-grad); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #ai-container { width: 90%; max-width: 850px; height: 88vh; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 30px; display: flex; flex-direction: column; }
        .header { padding: 20px 25px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.2rem; margin: 0; color: var(--accent); }
        #chat-window { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 18px; border-radius: 20px; font-size: 15px; line-height: 1.5; }
        .bot { align-self: flex-start; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); }
        .user { align-self: flex-end; background: var(--accent); color: #000; font-weight: 600; }
        #input-area { padding: 20px; background: rgba(0,0,0,0.2); display: flex; gap: 12px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 14px; border-radius: 15px; color: white; outline: none; }
        button { background: var(--accent); color: #000; border: none; padding: 0 25px; border-radius: 15px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="ai-container">
    <div class="header">
        <h1>EmirAI // EXPLORER</h1>
        <div id="status" style="font-size: 11px; color: #00ff88;">BAŞLIK ARANIYOR...</div>
    </div>
    <div id="chat-window">
        <!-- İlk mesaj buraya JavaScript ile gelecek -->
    </div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Konuyu buraya yaz kanka..." autocomplete="off">
        <button onclick="askAI()">SORGULA</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const forbidden = ["p*rno", "s*ks", "adult", "cinsel", "+18", "v*rjin"]; // Kısıtlı kelimeler

    function isClean(text) {
        const low = text.toLowerCase();
        return !forbidden.some(word => low.includes(word.replace('*','')));
    }

    // --- RASTGELE BAŞLIK GETİRME FONKSİYONU ---
    async function setRandomGreeting() {
        try {
            // Wikipedia'dan rastgele bir başlık al
            const res = await fetch(`https://tr.wikipedia.org/w/api.php?action=query&list=random&rnnamespace=0&rnlimit=1&format=json&origin=*`);
            const data = await res.json();
            const randomTitle = data.query.random[0].title;

            // Eğer başlık güvenliyse ekrana bas, değilse tekrar dene
            if (isClean(randomTitle)) {
                addMessage(`Selam kanka! Bugün istersen sana "${randomTitle}" hakkında bilgi verebilirim. Ya da ne istersen onu sor! 🍯`, 'bot');
                document.getElementById('status').innerText = "SİSTEM HAZIR";
            } else {
                setRandomGreeting(); // Güvenli değilse yeni bir tane bul
            }
        } catch (e) {
            addMessage("Selam kanka! İstediğin her konuda sana bilgi verebilirim.", 'bot');
        }
    }

    async function askAI() {
        const input = document.getElementById('userInput').value.trim();
        if (!input) return;

        addMessage(input, 'user');
        document.getElementById('userInput').value = '';

        if (!isClean(input)) {
            setTimeout(() => addMessage("Kanka bu konu okul kurallarına uygun değil, temiz takılalım! 👋", 'bot'), 500);
            return;
        }

        let query = input.toLowerCase().replace("nedir", "").replace("kimdir", "").trim();
        
        try {
            const sUrl = `https://tr.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*`;
            const sRes = await fetch(sUrl);
            const sData = await sRes.json();
            
            if (sData.query.search.length > 0) {
                const title = sData.query.search[0].title;
                const dUrl = `https://tr.wikipedia.org/w/api.php?action=query&prop=extracts&exintro&explaintext&titles=${encodeURIComponent(title)}&format=json&origin=*`;
                const dRes = await fetch(dUrl);
                const dData = await dRes.json();
                const extract = dData.query.pages[Object.keys(dData.query.pages)[0]].extract;
                
                if (extract && isClean(extract)) {
                    addMessage(`${title} hakkında bildiklerim şöyle kanka: \n\n${extract.substring(0, 450)}...`, 'bot');
                } else {
                    addMessage("Bu konunun içeriği filtreye takıldı kanka, paylaşamam.", 'bot');
                }
            } else {
                addMessage("Aradığın şeyi bulamadım kanka, başka bir şey deneyelim mi?", 'bot');
            }
        } catch (e) {
            addMessage("Bağlantıda bir sorun oldu kanka.", 'bot');
        }
    }

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // Sayfa açıldığında rastgele selamı başlat
    window.onload = setRandomGreeting;
    document.getElementById('userInput').addEventListener("keypress", (e) => { if(e.key === "Enter") askAI(); });
</script>
</body>
</html>
